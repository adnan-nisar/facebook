<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook-Login</title>
    <link rel="stylesheet" href="login.css">
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="leftbox">
         <div class="img">
            <img src="images/fb-logo.svg" alt="Facebook Login" height="100px">
         </div>
         <div class="subhead">
   <p>Facebook helps you connect and share with the people in your life.</p>
         </div>

        </div>
        <div class="rightbox">
        <input type="email" placeholder="Email or phone number" class="email">
        <br>
        <div class="password-wrap">
          <input type="password" placeholder="Password" class="password" id="loginPasswordInput">
          <button type="button" class="eye-btn" id="loginPasswordEye" aria-label="Toggle password visibility" aria-pressed="false">
            <i class="fa-solid fa-eye"></i>
          </button>
        </div>
        <br>
        <button class="loginbtn">Log In</button>
        <br>
        <a href="#" class="forgot">Forgotten password?</a>
        <hr>
        <a href="./register.html"><button class="createbtn">Create New Account</button></a>
       <p class="lastp"> <a href="">Create a Page-</a> for a celebrity, brand or business.</p>
  
        </div>
    </div>
   
    <script src="login.js"></script>
</body>
</html>
